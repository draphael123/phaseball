<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>PHASEBALL — Monkey-Ball Core Prototype</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#070912;color:#dbe7ff;font-family:"Segoe UI",system-ui,sans-serif;touch-action:none}
  #app{position:fixed;inset:0}
  #hud{position:fixed;inset:0;pointer-events:none;z-index:5}
  .panel{position:absolute;padding:10px 14px;background:rgba(10,16,34,.55);border:1px solid rgba(55,230,255,.25);
    border-radius:12px;backdrop-filter:blur(6px)}
  #info{top:14px;left:14px;font-size:13px;line-height:1.6;max-width:340px}
  #info b{color:#37e6ff}
  #info .k{display:inline-block;min-width:18px;padding:1px 6px;margin:0 1px;background:rgba(55,230,255,.12);
    border:1px solid rgba(55,230,255,.4);border-radius:5px;color:#fff}
  #stat{top:14px;right:14px;font-size:13px;text-align:right;line-height:1.6}
  #stat b{color:#ffd24a}
  #flash{position:absolute;top:30%;left:50%;transform:translateX(-50%) scale(.6);font-size:48px;font-weight:800;
    font-style:italic;letter-spacing:4px;color:#fff;opacity:0;text-shadow:0 0 24px #ff4fd8;white-space:nowrap}
  #flash.show{animation:pop 1.1s ease-out}
  @keyframes pop{0%{opacity:0;transform:translateX(-50%) scale(.4)}20%{opacity:1;transform:translateX(-50%) scale(1.15)}
    35%{transform:translateX(-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) scale(1.05)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <div id="info" class="panel">
    <b>MONKEY-BALL CORE PROTOTYPE</b><br/>
    The whole <b>stage tilts</b> under real gravity — a true rolling-ball sim (cannon-es).<br/>
    <span class="k">W</span><span class="k">A</span><span class="k">S</span><span class="k">D</span> / arrows — tilt the stage &nbsp;·&nbsp;
    <span class="k">R</span> — reset<br/>
    Roll to the green goal. Fall off the edge and you reset.
  </div>
  <div id="stat" class="panel">tilt <b id="tiltread">0°</b><br/>speed <b id="spd">0.0</b></div>
  <div id="flash"></div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
} }
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

// ---------------------------------------------------------------------------
// PROTOTYPE: the authentic Super-Monkey-Ball core.
// Gravity is constant and points straight down. Player input rotates the ENTIRE
// stage (a kinematic rigid body + matching meshes) around its centre, limited
// and eased. The ball is a dynamic sphere that simply obeys gravity on the
// tilted surface — real rolling, real momentum, real fall-off-the-edge.
// ---------------------------------------------------------------------------

const TUNE = {
  gravity: 22,
  maxTilt: 0.34,     // radians the stage can lean (~19°)
  tiltLerp: 8,       // how fast tilt eases toward input
  ballR: 0.5,
  killY: -10,
};

// ---- three.js scene ------------------------------------------------------
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.1;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0618);
scene.fog = new THREE.FogExp2(0x0a0618, 0.02);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 400);

scene.add(new THREE.HemisphereLight(0x5a3a86, 0x05070f, 0.9));
const key = new THREE.DirectionalLight(0xbfe9ff, 1.2);
key.position.set(6,16,8); key.castShadow=true; key.shadow.mapSize.set(1024,1024);
const sc=key.shadow.camera; sc.near=1; sc.far=60; sc.left=-25; sc.right=25; sc.top=25; sc.bottom=-25;
scene.add(key);
scene.add(new THREE.PointLight(0xff4fd8,0.5,60).translateY(6));

// neon grid far below for depth/parallax
const gridMat = new THREE.MeshBasicMaterial({color:0xff4fd8, transparent:true, opacity:0.18, side:THREE.DoubleSide});
(function grid(){
  const c=document.createElement('canvas'); c.width=c.height=128;
  const x=c.getContext('2d'); x.strokeStyle='#fff'; x.lineWidth=4; x.strokeRect(0,0,128,128);
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(40,40);
  gridMat.map=t;
})();
const gridFloor=new THREE.Mesh(new THREE.PlaneGeometry(400,400), gridMat);
gridFloor.rotation.x=-Math.PI/2; gridFloor.position.y=-8; scene.add(gridFloor);

// ---- physics world -------------------------------------------------------
const world = new CANNON.World({ gravity: new CANNON.Vec3(0,-TUNE.gravity,0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = false;
world.solver.iterations = 14;          // stiffer contacts = less bounce
const ballMat = new CANNON.Material('ball');
const groundMat = new CANNON.Material('ground');
world.addContactMaterial(new CANNON.ContactMaterial(ballMat, groundMat, { friction:0.45, restitution:0.0 }));

// ---- the tiltable stage (one kinematic body + matching meshes) -----------
const stageBody = new CANNON.Body({ mass:0, type:CANNON.Body.KINEMATIC, material:groundMat });
world.addBody(stageBody);
const stageGroup = new THREE.Group(); scene.add(stageGroup);

let goalLocal = new THREE.Vector3();   // goal position in stage-local space
const gemMeshes = [];                  // banana collectibles {mesh, local, got}

function addBox(hx,hy,hz, p, eul, color){
  const shape = new CANNON.Box(new CANNON.Vec3(hx,hy,hz));
  const q = new CANNON.Quaternion(); if(eul) q.setFromEuler(eul[0]||0, eul[1]||0, eul[2]||0);
  stageBody.addShape(shape, new CANNON.Vec3(p[0],p[1],p[2]), q);
  const m = new THREE.Mesh(new THREE.BoxGeometry(hx*2,hy*2,hz*2),
    new THREE.MeshStandardMaterial({color, roughness:.75, metalness:.1, emissive:0x0a1426, emissiveIntensity:.4}));
  m.position.set(p[0],p[1],p[2]); if(eul) m.rotation.set(eul[0]||0, eul[1]||0, eul[2]||0);
  m.receiveShadow=true; m.castShadow=true;
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),
    new THREE.LineBasicMaterial({color:0x37e6ff, transparent:true, opacity:.6})));
  stageGroup.add(m);
}
function addBanana(p){
  const m = new THREE.Mesh(new THREE.TorusGeometry(0.26,0.085,10,22,Math.PI*1.15),
    new THREE.MeshStandardMaterial({color:0xffe24a, emissive:0xffaa12, emissiveIntensity:1.1}));
  m.rotation.z=Math.PI*0.62; m.position.set(p[0],p[1],p[2]); stageGroup.add(m);
  gemMeshes.push({mesh:m, local:new THREE.Vector3(p[0],p[1],p[2]), got:false, base:p[1]});
}
function addGoal(p,r){
  const ring=new THREE.Mesh(new THREE.TorusGeometry(r,0.12,16,40),
    new THREE.MeshStandardMaterial({color:0x66ffaa, emissive:0x33ff99, emissiveIntensity:1.5}));
  ring.rotation.x=Math.PI/2; ring.position.set(p[0],p[1]+0.4,p[2]); stageGroup.add(ring);
  const beam=new THREE.Mesh(new THREE.CylinderGeometry(r*0.8,r*0.8,12,20,1,true),
    new THREE.MeshBasicMaterial({color:0x66ffaa,transparent:true,opacity:.12,side:THREE.DoubleSide}));
  beam.position.set(p[0],p[1]+6,p[2]); stageGroup.add(beam);
  goalLocal.set(p[0],p[1],p[2]); goalRing=ring; goalR=r;
}
let goalRing=null, goalR=1.6;

// ---- build the course --------------------------------------------------
// One flat board (open edges = fall off). Kept simple so the *roll* is the
// only thing to judge; contours/ramps come once the core feel is approved.
addBox(8,0.5,18, [0,0,0], null, 0x16284a);               // board top at y=0.5
addBanana([0,1.1,8]); addBanana([-2.5,1.1,3]); addBanana([2.5,1.1,-2]);
addBanana([0,1.1,-7]); addBanana([-2,1.1,-12]);
addGoal([0,0.5,-14], 1.6);

// ---- the ball ------------------------------------------------------------
const ballBody = new CANNON.Body({ mass:1, shape:new CANNON.Sphere(TUNE.ballR), material:ballMat,
  angularDamping:0.3, linearDamping:0.04 });
world.addBody(ballBody);
const ballMesh = new THREE.Mesh(
  new THREE.SphereGeometry(TUNE.ballR, 32, 32),
  new THREE.MeshStandardMaterial({color:0xffffff, metalness:1, roughness:0.08})
);
ballMesh.castShadow=true; scene.add(ballMesh);
// a little face so it reads as a character
const eyeMat=new THREE.MeshBasicMaterial({color:0xffffff}), pupMat=new THREE.MeshBasicMaterial({color:0x101418});
function eye(sx){ const g=new THREE.Group();
  const w=new THREE.Mesh(new THREE.SphereGeometry(0.13,14,14),eyeMat); w.scale.z=0.4;
  const p=new THREE.Mesh(new THREE.SphereGeometry(0.07,10,10),pupMat); p.position.z=0.08;
  g.add(w,p); g.position.set(sx,0.13,0.46); return g; }
const face=new THREE.Group(); face.add(eye(-0.17),eye(0.17)); scene.add(face);

const START = new CANNON.Vec3(0,1.4,12);
function reset(){
  ballBody.position.copy(START); ballBody.velocity.setZero(); ballBody.angularVelocity.setZero();
  ballBody.quaternion.set(0,0,0,1);
  tilt.x=tilt.z=0; tiltTarget.x=tiltTarget.z=0;
  for(const g of gemMeshes){ g.got=false; g.mesh.visible=true; }
}

// ---- input (tilt the stage) ----------------------------------------------
const keys={}, tilt={x:0,z:0}, tiltTarget={x:0,z:0};
addEventListener('keydown',e=>{ keys[e.code]=true; if(e.code==='KeyR') reset(); });
addEventListener('keyup',e=>keys[e.code]=false);
// touch: drag anywhere to tilt
let touching=false, tcx=0, tcy=0;
addEventListener('pointerdown',e=>{ touching=true; tcx=e.clientX; tcy=e.clientY; });
addEventListener('pointermove',e=>{ if(!touching) return;
  tiltTarget.x=Math.max(-1,Math.min(1,(e.clientX-tcx)/120));
  tiltTarget.z=Math.max(-1,Math.min(1,(e.clientY-tcy)/120)); });
addEventListener('pointerup',()=>{ touching=false; tiltTarget.x=tiltTarget.z=0; });

function flash(t){ const f=document.getElementById('flash'); f.textContent=t;
  f.classList.remove('show'); void f.offsetWidth; f.classList.add('show'); }

// ---- loop ----------------------------------------------------------------
const camPos=new THREE.Vector3(0,7,12);
const _q=new THREE.Quaternion(), _v=new THREE.Vector3();
let last=performance.now(), won=0, t=0;
function frame(now){
  requestAnimationFrame(frame);
  let dt=(now-last)/1000; last=now; if(dt>0.05) dt=0.05; t+=dt;

  // keyboard -> tilt target
  if(!touching){
    let ix=0, iz=0;
    if(keys['KeyD']||keys['ArrowRight']) ix+=1;
    if(keys['KeyA']||keys['ArrowLeft'])  ix-=1;
    if(keys['KeyS']||keys['ArrowDown'])  iz+=1;
    if(keys['KeyW']||keys['ArrowUp'])    iz-=1;
    tiltTarget.x=ix; tiltTarget.z=iz;
  }
  // ease tilt toward input
  const k=1-Math.exp(-TUNE.tiltLerp*dt);
  tilt.x+=(tiltTarget.x*TUNE.maxTilt-tilt.x)*k;
  tilt.z+=(tiltTarget.z*TUNE.maxTilt-tilt.z)*k;
  // Drive the kinematic stage by ANGULAR VELOCITY (not by teleporting its
  // orientation) so the solver carries the ball with the surface instead of
  // ejecting it upward — that ejection was the "jumping instead of rolling".
  const target=new CANNON.Quaternion(); target.setFromEuler(tilt.z, 0, -tilt.x);
  const curConj=new CANNON.Quaternion(); stageBody.quaternion.conjugate(curConj);
  const delta=new CANNON.Quaternion(); target.mult(curConj, delta); delta.normalize();
  const aa=delta.toAxisAngle(); let axis=aa[0], ang=aa[1];
  if(ang>Math.PI) ang-=2*Math.PI;
  const inv=1/Math.max(dt,1e-4);
  stageBody.angularVelocity.set(axis.x*ang*inv, axis.y*ang*inv, axis.z*ang*inv);

  // step physics
  world.step(1/120, dt, 8);

  // sync visuals
  stageGroup.quaternion.set(stageBody.quaternion.x, stageBody.quaternion.y, stageBody.quaternion.z, stageBody.quaternion.w);
  ballMesh.position.copy(ballBody.position);
  ballMesh.quaternion.copy(ballBody.quaternion);
  // face rides on top of the ball, upright, looking toward travel (no spin)
  face.position.copy(ballBody.position);
  const sp=Math.hypot(ballBody.velocity.x, ballBody.velocity.z);
  if(sp>0.3) face.rotation.y=Math.atan2(ballBody.velocity.x, ballBody.velocity.z);

  // banana pickups (compare in world space)
  for(const g of gemMeshes){ if(g.got) continue;
    g.mesh.rotation.y+=dt*2; g.mesh.position.y=g.base+Math.sin(t*2+g.local.x)*0.12;
    stageGroup.localToWorld(_v.copy(g.local));
    if(_v.distanceTo(ballMesh.position)<0.8){ g.got=true; g.mesh.visible=false; flash('+1'); }
  }

  // goal check (world space) + fall-out
  if(goalRing){
    stageGroup.localToWorld(_v.copy(goalLocal));
    if(!won && _v.distanceTo(ballMesh.position) < goalR+0.2){ won=0.9; flash('GOAL!'); }
    goalRing.rotation.z+=dt*1.2;
  }
  if(won>0){ won-=dt; if(won<=0) reset(); }
  if(ballBody.position.y < TUNE.killY){ flash('FELL'); reset(); }

  // low chase camera (world-up; you SEE the stage tilt)
  const desired=_v.set(ballBody.position.x, ballBody.position.y+7, ballBody.position.z+12);
  camPos.lerp(desired, 1-Math.exp(-4*dt)); camera.position.copy(camPos);
  camera.lookAt(ballBody.position.x, ballBody.position.y+0.5, ballBody.position.z-2);

  // HUD
  document.getElementById('tiltread').textContent=Math.round(Math.hypot(tilt.x,tilt.z)*180/Math.PI)+'°';
  document.getElementById('spd').textContent=sp.toFixed(1);

  renderer.render(scene,camera);
}
reset();
requestAnimationFrame(frame);

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); });

window.__proto={ TUNE, ballBody, stageBody, reset };
</script>
</body>
</html>
